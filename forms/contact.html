<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f4f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      padding: 48px 40px;
      width: 100%;
      max-width: 520px;
    }

    h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #6b7280; font-size: 15px; margin-bottom: 32px; }

    .field { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #374151; }

    input, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 7px;
      font-size: 15px;
      font-family: inherit;
      color: #111;
      background: #fff;
      transition: border-color .15s;
      outline: none;
    }
    input:focus, textarea:focus { border-color: #0f172a; box-shadow: 0 0 0 3px rgba(15,23,42,.08); }

    textarea { resize: vertical; min-height: 130px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 480px) { .row { grid-template-columns: 1fr; } .card { padding: 32px 24px; } }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #0f172a;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s, opacity .15s;
    }
    button[type="submit"]:hover { background: #1e293b; }
    button[type="submit"]:disabled { opacity: .6; cursor: not-allowed; }

    .success {
      display: none;
      text-align: center;
      padding: 32px 20px;
    }
    .success .icon {
      width: 56px; height: 56px;
      background: #f0fdf4;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 26px;
    }
    .success h2 { font-size: 22px; margin-bottom: 10px; }
    .success p { color: #6b7280; font-size: 15px; line-height: 1.6; }

    .error-msg { color: #dc2626; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
  </style>
</head>
<body>
<div class="card">
  <div id="form-wrap">
    <h1>Get in Touch</h1>
    <p class="subtitle">We'd love to hear from you. Send us a message and we'll respond within 1–2 business days.</p>

    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" id="contact-form" novalidate>
      <input type="hidden" name="form-name" value="contact">
      <p style="display:none"><label>Don't fill this out: <input name="bot-field"></label></p>

      <div class="row">
        <div class="field">
          <label for="name">Full Name *</label>
          <input type="text" id="name" name="name" required autocomplete="name" placeholder="Jane Smith">
        </div>
        <div class="field">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="jane@example.com">
        </div>
      </div>

      <div class="field">
        <label for="subject">Subject *</label>
        <input type="text" id="subject" name="subject" required placeholder="What's this about?">
      </div>

      <div class="field">
        <label for="message">Message *</label>
        <textarea id="message" name="message" required placeholder="Tell us what's on your mind…"></textarea>
      </div>

      <button type="submit" id="submit-btn">Send Message</button>
      <p class="error-msg" id="error-msg">Something went wrong. Please try again.</p>
    </form>
  </div>

  <div class="success" id="success">
    <div class="icon">✓</div>
    <h2>Message received!</h2>
    <p>Thanks for reaching out. We've sent a confirmation to your email and will be in touch soon.</p>
  </div>
</div>

<script>
  const form = document.getElementById('contact-form');
  const btn = document.getElementById('submit-btn');
  const errorMsg = document.getElementById('error-msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!form.checkValidity()) { form.reportValidity(); return; }

    btn.disabled = true;
    btn.textContent = 'Sending…';
    errorMsg.style.display = 'none';

    try {
      const res = await fetch('/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(new FormData(form)).toString(),
      });

      if (!res.ok) throw new Error();
      document.getElementById('form-wrap').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    } catch {
      btn.disabled = false;
      btn.textContent = 'Send Message';
      errorMsg.style.display = 'block';
    }
  });
</script>
</body>
</html>
