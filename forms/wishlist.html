<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join the Wishlist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f4f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #f5f3ff;
      color: #7c3aed;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    h1 { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
    .subtitle { color: #6b7280; font-size: 15px; line-height: 1.6; margin-bottom: 36px; }

    .field { margin-bottom: 16px; text-align: left; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #374151; }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 7px;
      font-size: 15px;
      font-family: inherit;
      color: #111;
      background: #fff;
      transition: border-color .15s;
      outline: none;
    }
    input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.1); }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s, opacity .15s;
    }
    button[type="submit"]:hover { background: #6d28d9; }
    button[type="submit"]:disabled { opacity: .6; cursor: not-allowed; }

    .privacy { font-size: 12px; color: #9ca3af; margin-top: 14px; }

    .success { display: none; padding: 20px 0; }
    .success .icon {
      width: 60px; height: 60px;
      background: #f5f3ff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }
    .success h2 { font-size: 22px; margin-bottom: 10px; }
    .success p { color: #6b7280; font-size: 15px; line-height: 1.6; }

    .error-msg { color: #dc2626; font-size: 13px; margin-top: 10px; display: none; }

    @media (max-width: 480px) { .card { padding: 32px 24px; } }
  </style>
</head>
<body>
<div class="card">
  <div id="form-wrap">
    <div class="badge">Early Access</div>
    <h1>Join the Wishlist</h1>
    <p class="subtitle">Be the first to know about new products, launches, and exclusive offers.</p>

    <form name="wishlist" data-netlify="true" netlify-honeypot="bot-field" id="wishlist-form" novalidate>
      <input type="hidden" name="form-name" value="wishlist">
      <p style="display:none"><label>Don't fill this out: <input name="bot-field"></label></p>

      <div class="field">
        <label for="name">First Name *</label>
        <input type="text" id="name" name="name" required autocomplete="given-name" placeholder="Jane">
      </div>

      <div class="field">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="jane@example.com">
      </div>

      <button type="submit" id="submit-btn">Join the Wishlist</button>
      <p class="error-msg" id="error-msg">Something went wrong. Please try again.</p>
      <p class="privacy">No spam. Unsubscribe anytime.</p>
    </form>
  </div>

  <div class="success" id="success">
    <div class="icon">🎉</div>
    <h2>You're on the list!</h2>
    <p>Check your inbox for a confirmation email. We'll be in touch when something exciting is ready.</p>
  </div>
</div>

<script>
  const form = document.getElementById('wishlist-form');
  const btn = document.getElementById('submit-btn');
  const errorMsg = document.getElementById('error-msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!form.checkValidity()) { form.reportValidity(); return; }

    btn.disabled = true;
    btn.textContent = 'Joining…';
    errorMsg.style.display = 'none';

    try {
      const res = await fetch('/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(new FormData(form)).toString(),
      });

      if (!res.ok) throw new Error();
      document.getElementById('form-wrap').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    } catch {
      btn.disabled = false;
      btn.textContent = 'Join the Wishlist';
      errorMsg.style.display = 'block';
    }
  });
</script>
</body>
</html>
